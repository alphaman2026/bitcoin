<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍄 Super Mario Web   test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Press Start 2P', monospace;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 20%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 10%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 80%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 90%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 50%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 15%, #fff 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 75%, #fff 0%, transparent 100%),
      radial-gradient(2px 2px at 15% 45%, rgba(255,255,200,0.8) 0%, transparent 100%),
      radial-gradient(2px 2px at 85% 70%, rgba(255,255,200,0.8) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  #gameWrapper {
    position: relative;
    z-index: 1;
  }

  #scoreBar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 800px;
    padding: 10px 16px;
    background: rgba(0,0,0,0.7);
    border: 3px solid #e8b000;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    color: #fff;
    font-size: 10px;
  }

  #scoreBar span { color: #ffd700; }

  #gameCanvas {
    display: block;
    border: 3px solid #e8b000;
    border-top: none;
    border-radius: 0 0 8px 8px;
    image-rendering: pixelated;
  }

  #overlay {
    position: absolute;
    top: 44px;
    left: 0;
    width: 800px;
    height: 450px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(10, 5, 30, 0.88);
    border-radius: 0 0 8px 8px;
    z-index: 10;
  }

  #overlay h1 {
    font-size: 28px;
    color: #ffd700;
    text-shadow: 4px 4px #b22222, -2px -2px #8b0000;
    margin-bottom: 16px;
    animation: titlePulse 1.5s ease-in-out infinite alternate;
  }

  @keyframes titlePulse {
    from { transform: scale(1); }
    to   { transform: scale(1.06); }
  }

  #overlay p {
    color: #aef;
    font-size: 10px;
    margin: 6px 0;
    line-height: 2;
  }

  #overlay .key-hint {
    color: #ffd700;
    background: rgba(255,215,0,0.12);
    padding: 12px 24px;
    border: 2px solid #ffd700;
    border-radius: 6px;
    font-size: 9px;
    margin-top: 18px;
    text-align: center;
    line-height: 2.2;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    50% { opacity: 0.3; }
  }

  #livesBar {
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .marioIcon {
    font-size: 14px;
  }

  #controls {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    width: 800px;
    justify-content: center;
  }

  .ctrl-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    padding: 8px 14px;
    background: #b22222;
    color: #fff;
    border: 3px solid #ffd700;
    border-radius: 4px;
    cursor: pointer;
    transition: background 0.1s, transform 0.1s;
    user-select: none;
    touch-action: manipulation;
  }

  .ctrl-btn:hover { background: #e04040; }
  .ctrl-btn:active { transform: scale(0.95); }
</style>
</head>
<body>
<div id="gameWrapper">
  <div id="scoreBar">
    <div>SCORE: <span id="scoreVal">0</span></div>
    <div>🍄 MARIO</div>
    <div>COINS: <span id="coinVal">0</span></div>
    <div>LEVEL: <span id="levelVal">1</span></div>
    <div id="livesBar">LIVES: <span class="marioIcon">❤️</span><span class="marioIcon">❤️</span><span class="marioIcon">❤️</span></div>
  </div>
  <canvas id="gameCanvas" width="800" height="450"></canvas>
  <div id="overlay">
    <h1> Alpahman~~~  임연호 화이팅     SUPER MARIO WEB</h1>
    <p>🍄 클래식 마리오 임연호 스타일 플랫포머</p>
    <div class="key-hint">
      ← → : 이동 &nbsp;|&nbsp; SPACE / ↑ : 점프<br>
      Z : 달리기 &nbsp;|&nbsp; R : 재시작<br>
      <br>
      [ SPACE BAR 를 눌러 시작! ]
    </div>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn" id="btnLeft">◀ 왼쪽</button>
  <button class="ctrl-btn" id="btnJump">▲ 점프</button>
  <button class="ctrl-btn" id="btnRight">오른쪽 ▶</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const scoreEl = document.getElementById('scoreVal');
const coinEl  = document.getElementById('coinVal');
const levelEl = document.getElementById('levelVal');
const livesEl = document.getElementById('livesBar');

const W = 800;
const H = 450;
const TILE = 32;
const GRAVITY = 0.55;
const JUMP_FORCE = -13;
const MOVE_SPEED = 3.5;
const RUN_SPEED  = 5.5;

const COLORS = {
  sky: '#5c94fc',
  skyLow: '#3070e8',
  cloud: '#ffffff',
  ground: '#c84b13',
  groundTop: '#e87038',
  brick: '#c84b13',
  brickLine: '#a03010',
  qBlock: '#e8b000',
  qBlockShine: '#ffd700',
  pipe: '#00a800',
  pipeDark: '#006000',
  mario: '#e83800',
  marioSkin: '#ffa858',
  marioBrown: '#6b3410',
  enemy: '#c80000',
  enemyFeet: '#8b0000',
  coin: '#ffd700',
  coinShine: '#fff8a0',
  flag: '#00c800',
  flagPole: '#888',
  text: '#ffffff',
};

let state, keys, touchKeys;

function initGame(level = 1) {
  const map = generateLevel(level);
  state = {
    running: false,
    gameOver: false,
    won: false,
    level,
    score: 0,
    coins: 0,
    lives: 3,
    camera: { x: 0 },
    map,
    player: createPlayer(map),
    enemies: spawnEnemies(map, level),
    particles: [],
    coinSparkles: [],
    floatingTexts: [],
    flagReached: false,
    deathTimer: 0,
    invincible: 0,
  };
  updateHUD();
}

const GROUND_ROW = 12;
const TOTAL_ROWS = GROUND_ROW + 2;

function generateLevel(lvl) {
  const cols = 80 + lvl * 20;
  const rows = TOTAL_ROWS;
  const grid = Array.from({ length: rows }, () => Array(cols).fill(0));

  for (let c = 0; c < cols; c++) {
    grid[GROUND_ROW][c] = 2;
    grid[GROUND_ROW + 1][c] = 1;
  }

  const gaps = [];
  for (let i = 0; i < lvl + 1; i++) {
    const gx = 15 + Math.floor(Math.random() * (cols - 30));
    const gw = 3 + Math.floor(Math.random() * 2);
    gaps.push({ x: gx, w: gw });
    for (let c = gx; c < gx + gw && c < cols; c++) {
      grid[GROUND_ROW][c] = 0;
      grid[GROUND_ROW + 1][c] = 0;
    }
  }

  for (let i = 0; i < 18 + lvl * 4; i++) {
    const c = 5 + Math.floor(Math.random() * (cols - 10));
    const r = GROUND_ROW - 3 - Math.floor(Math.random() * 4);
    if (r < 1) continue;
    const len = 1 + Math.floor(Math.random() * 5);
    for (let j = 0; j < len && c + j < cols; j++) {
      grid[r][c + j] = Math.random() < 0.2 ? 4 : 3;
    }
  }

  const pipes = [];
  for (let i = 0; i < 4 + lvl; i++) {
    const px = 12 + Math.floor(Math.random() * (cols - 20));
    const ph = 2 + Math.floor(Math.random() * 2);
    const pipeTopRow = GROUND_ROW - ph;
    pipes.push({ x: px * TILE, y: pipeTopRow * TILE, w: TILE * 2, h: ph * TILE });
    grid[pipeTopRow][px] = 5;
    grid[pipeTopRow][px + 1] = 5;
    for (let row = pipeTopRow + 1; row < GROUND_ROW; row++) {
      grid[row][px] = 6;
      grid[row][px + 1] = 6;
    }
  }

  const flagX = (cols - 4) * TILE;
  const flagY = (GROUND_ROW - 7) * TILE;

  return {
    grid,
    rows,
    cols,
    pipes,
    gaps,
    flagX,
    flagY,
    width: cols * TILE,
    height: rows * TILE
  };
}

function createPlayer(map) {
  const spawnY = GROUND_ROW * TILE - 32;
  return {
    x: TILE * 3,
    y: spawnY,
    w: 24,
    h: 32,
    vx: 0,
    vy: 0,
    onGround: false,
    facing: 1,
    running: false,
    frame: 0,
    frameTimer: 0,
    big: false,
  };
}

function spawnEnemies(map, lvl) {
  const enemies = [];
  const count = 6 + lvl * 3;
  for (let i = 0; i < count; i++) {
    const ex = (10 + Math.floor(Math.random() * (map.cols - 20))) * TILE;
    enemies.push({
      x: ex,
      y: GROUND_ROW * TILE - 28,
      w: 28,
      h: 28,
      vx: -(0.8 + Math.random() * 0.6),
      vy: 0,
      onGround: false,
      dead: false,
      deadTimer: 0,
      frame: 0,
      frameTimer: 0,
      type: Math.random() < 0.3 ? 'koopa' : 'goomba',
    });
  }
  return enemies;
}

function isSolid(tx, ty) {
  const { grid, rows, cols } = state.map;
  if (tx < 0 || ty < 0 || tx >= cols || ty >= rows) return ty >= rows;
  const t = grid[ty][tx];
  return t === 1 || t === 2 || t === 3 || t === 5 || t === 6;
}

function isQuestion(tx, ty) {
  if (ty < 0) return false;
  const { grid, rows, cols } = state.map;
  if (tx < 0 || ty >= rows || tx >= cols) return false;
  return grid[ty][tx] === 4;
}

function isBrick(tx, ty) {
  if (ty < 0) return false;
  const { grid, rows, cols } = state.map;
  if (tx < 0 || ty >= rows || tx >= cols) return false;
  return grid[ty][tx] === 3;
}

function hitQuestion(tx, ty) {
  state.map.grid[ty][tx] = 3;
  spawnCoin(tx * TILE + TILE / 2, ty * TILE);
}

function breakBrick(tx, ty) {
  state.map.grid[ty][tx] = 0;
  spawnBrickParticles(tx * TILE, ty * TILE);
  addScore(50);
}

function resolveEntity(ent) {
  ent.vy += GRAVITY;
  ent.x += ent.vx;

  const x0 = Math.floor(ent.x / TILE);
  const x1 = Math.floor((ent.x + ent.w - 1) / TILE);
  const yMid = Math.floor((ent.y + ent.h / 2) / TILE);

  if (ent.vx > 0 && isSolid(x1, yMid)) {
    ent.x = x1 * TILE - ent.w;
    ent.vx = -ent.vx;
  } else if (ent.vx < 0 && isSolid(x0, yMid)) {
    ent.x = (x0 + 1) * TILE;
    ent.vx = -ent.vx;
  }

  if (ent.x < 0) {
    ent.x = 0;
    ent.vx = 0;
  }

  ent.y += ent.vy;
  const y0 = Math.floor(ent.y / TILE);
  const y1 = Math.floor((ent.y + ent.h - 1) / TILE);
  ent.onGround = false;

  if (ent.vy > 0) {
    if (isSolid(Math.floor(ent.x / TILE), y1) || isSolid(Math.floor((ent.x + ent.w - 1) / TILE), y1)) {
      ent.y = y1 * TILE - ent.h;
      ent.vy = 0;
      ent.onGround = true;
    }
  } else if (ent.vy < 0) {
    const topTx0 = Math.floor(ent.x / TILE);
    const topTx1 = Math.floor((ent.x + ent.w - 1) / TILE);
    if (isSolid(topTx0, y0) || isSolid(topTx1, y0)) {
      ent.y = (y0 + 1) * TILE;
      ent.vy = 1;
      for (let tx = topTx0; tx <= topTx1; tx++) {
        if (isQuestion(tx, y0)) hitQuestion(tx, y0);
        else if (isBrick(tx, y0)) breakBrick(tx, y0);
      }
    }
  }
}

function spawnCoin(cx, cy) {
  state.coins++;
  state.score += 200;
  updateHUD();
  state.coinSparkles.push({ x: cx, y: cy, vy: -6, life: 60, maxLife: 60 });
  addFloatingText('+200', cx, cy, '#ffd700');
}

function spawnBrickParticles(bx, by) {
  for (let i = 0; i < 6; i++) {
    state.particles.push({
      x: bx + Math.random() * TILE,
      y: by + Math.random() * TILE,
      vx: (Math.random() - 0.5) * 6,
      vy: -4 - Math.random() * 4,
      life: 40,
      color: COLORS.brick,
      size: 6 + Math.random() * 4,
    });
  }
}

function addScore(n, px, py) {
  state.score += n;
  updateHUD();
  if (px !== undefined) addFloatingText('+' + n, px, py, '#fff');
}

function addFloatingText(txt, x, y, color) {
  state.floatingTexts.push({ txt, x, y, vy: -1.5, life: 60, color });
}

function updateHUD() {
  scoreEl.textContent = state.score;
  coinEl.textContent = state.coins;
  levelEl.textContent = state.level;
  const hearts = Array.from({ length: state.lives }, () => '❤️').join('');
  livesEl.innerHTML = 'LIVES: ' + (hearts || '💀');
}

function updatePlayer(dt) {
  const p = state.player;

  if (state.deathTimer > 0) {
    state.deathTimer--;
    p.vy += GRAVITY;
    p.y += p.vy;
    if (state.deathTimer === 0) {
      if (state.lives <= 0) {
        state.gameOver = true;
        showOverlay('GAME OVER', 'R키로 재시작');
      } else {
        respawnPlayer();
      }
    }
    return;
  }

  if (state.invincible > 0) state.invincible--;

  const run = keys['KeyZ'] || touchKeys.run;
  const speed = run ? RUN_SPEED : MOVE_SPEED;

  if ((keys['ArrowLeft'] || touchKeys.left) && !state.flagReached) {
    p.vx = Math.max(p.vx - 0.8, -speed);
    p.facing = -1;
  } else if ((keys['ArrowRight'] || touchKeys.right) && !state.flagReached) {
    p.vx = Math.min(p.vx + 0.8, speed);
    p.facing = 1;
  } else {
    p.vx *= 0.78;
    if (Math.abs(p.vx) < 0.1) p.vx = 0;
  }

  if ((keys['Space'] || keys['ArrowUp'] || touchKeys.jump) && p.onGround && !state.flagReached) {
    p.vy = JUMP_FORCE;
    p.onGround = false;
    spawnJumpDust();
  }

  resolveEntity(p);

  if (p.y > H + 100) killPlayer();

  if (!state.flagReached && p.x + p.w > state.map.flagX) {
    state.flagReached = true;
    p.vx = 0;
    setTimeout(() => nextLevel(), 2500);
  }

  p.frameTimer++;
  if (Math.abs(p.vx) > 0.5 && p.onGround) {
    if (p.frameTimer > (run ? 4 : 7)) {
      p.frame = (p.frame + 1) % 3;
      p.frameTimer = 0;
    }
  } else {
    p.frame = 0;
  }

  state.camera.x = Math.max(0, Math.min(p.x - W / 3, state.map.width - W));
}

function spawnJumpDust() {
  const p = state.player;
  for (let i = 0; i < 4; i++) {
    state.particles.push({
      x: p.x + p.w / 2,
      y: p.y + p.h,
      vx: (Math.random() - 0.5) * 3,
      vy: Math.random() * -1,
      life: 20,
      color: '#ddd',
      size: 4,
    });
  }
}

function killPlayer() {
  if (state.invincible > 0 || state.deathTimer > 0) return;
  state.lives--;
  updateHUD();
  state.deathTimer = 80;
  state.player.vy = -10;
  state.player.vx = 0;
}

function respawnPlayer() {
  state.player = createPlayer(state.map);
  state.invincible = 120;
}

function nextLevel() {
  initGame(state.level + 1);
  state.running = true;
  hideOverlay();
}

function updateEnemies() {
  for (const e of state.enemies) {
    if (e.dead) {
      e.deadTimer++;
      continue;
    }

    resolveEntity(e);

    if (e.y > H + 100) e.dead = true;

    e.frameTimer++;
    if (e.frameTimer > 12) {
      e.frame = (e.frame + 1) % 2;
      e.frameTimer = 0;
    }

    if (state.invincible === 0 && state.deathTimer === 0 && !state.flagReached) {
      const p = state.player;
      if (rectsOverlap(p, e)) {
        if (p.vy > 0 && p.y + p.h < e.y + e.h * 0.6) {
          e.dead = true;
          p.vy = -8;
          addScore(100, e.x + e.w / 2, e.y);
          spawnStompParticles(e.x + e.w / 2, e.y);
        } else {
          killPlayer();
        }
      }
    }
  }

  state.enemies = state.enemies.filter(e => !e.dead || e.deadTimer < 30);
}

function rectsOverlap(a, b) {
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

function spawnStompParticles(cx, cy) {
  for (let i = 0; i < 8; i++) {
    const angle = (i / 8) * Math.PI * 2;
    state.particles.push({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * 3,
      vy: Math.sin(angle) * 3,
      life: 25,
      color: COLORS.enemy,
      size: 5,
    });
  }
}

function updateParticles() {
  for (const p of state.particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.life--;
  }
  state.particles = state.particles.filter(p => p.life > 0);

  for (const c of state.coinSparkles) {
    c.y += c.vy;
    c.vy += 0.4;
    c.life--;
  }
  state.coinSparkles = state.coinSparkles.filter(c => c.life > 0);

  for (const t of state.floatingTexts) {
    t.y += t.vy;
    t.life--;
  }
  state.floatingTexts = state.floatingTexts.filter(t => t.life > 0);
}

function draw() {
  if (!state) return;

  const cam = state.camera.x;

  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, COLORS.sky);
  skyGrad.addColorStop(1, COLORS.skyLow);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  drawClouds(cam);
  drawTiles(cam);
  drawFlag(cam);

  for (const e of state.enemies) drawEnemy(e, cam);

  drawPlayer(cam);

  for (const p of state.particles) {
    ctx.globalAlpha = p.life / 40;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - cam - p.size / 2, p.y - p.size / 2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  for (const c of state.coinSparkles) {
    const a = c.life / c.maxLife;
    ctx.globalAlpha = a;
    drawCoinPixel(c.x - cam, c.y, 14 * a);
  }
  ctx.globalAlpha = 1;

  ctx.textAlign = 'center';
  for (const t of state.floatingTexts) {
    ctx.globalAlpha = t.life / 60;
    ctx.fillStyle = t.color;
    ctx.font = 'bold 11px "Press Start 2P", monospace';
    ctx.fillText(t.txt, t.x - cam, t.y);
  }
  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

function drawClouds(cam) {
  const clouds = [
    { x: 100, y: 60, s: 1 },
    { x: 280, y: 40, s: 1.4 },
    { x: 500, y: 70, s: 1.1 },
    { x: 750, y: 50, s: 0.9 },
    { x: 1000, y: 65, s: 1.2 },
    { x: 1300, y: 45, s: 1 },
    { x: 1600, y: 60, s: 1.3 },
    { x: 1900, y: 50, s: 0.8 },
    { x: 2200, y: 40, s: 1.1 },
    { x: 2500, y: 70, s: 1.2 },
  ];

  for (const c of clouds) {
    const cx = c.x - cam * 0.4;
    if (cx < -120 || cx > W + 120) continue;
    drawCloud(cx, c.y, c.s);
  }
}

function drawCloud(x, y, s) {
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x, y, 22 * s, 0, Math.PI * 2);
  ctx.arc(x + 22 * s, y - 8 * s, 18 * s, 0, Math.PI * 2);
  ctx.arc(x + 44 * s, y, 22 * s, 0, Math.PI * 2);
  ctx.arc(x + 22 * s, y + 10 * s, 18 * s, 0, Math.PI * 2);
  ctx.fill();
}

function drawTiles(cam) {
  const { grid, rows, cols } = state.map;
  const startC = Math.max(0, Math.floor(cam / TILE) - 1);
  const endC = Math.min(cols, Math.ceil((cam + W) / TILE) + 1);

  for (let r = 0; r < rows; r++) {
    for (let c = startC; c < endC; c++) {
      const t = grid[r][c];
      if (!t) continue;
      const sx = c * TILE - cam;
      const sy = r * TILE;
      drawTile(t, sx, sy, r, c);
    }
  }
}

function drawTile(t, sx, sy, r, c) {
  if (t === 1) {
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = '#6b3010';
    for (let i = 0; i < TILE; i += 8) {
      ctx.fillRect(sx + i, sy, 1, TILE);
      ctx.fillRect(sx, sy + i, TILE, 1);
    }
  } else if (t === 2) {
    ctx.fillStyle = COLORS.groundTop;
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = '#a06020';
    ctx.fillRect(sx, sy, TILE, 4);
    ctx.fillStyle = '#804010';
    ctx.fillRect(sx, sy + 4, TILE, 2);
    ctx.fillStyle = '#4ac040';
    for (let i = 2; i < TILE - 2; i += 4) {
      ctx.fillRect(sx + i, sy, 2, 3);
    }
  } else if (t === 3) {
    ctx.fillStyle = COLORS.brick;
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = COLORS.brickLine;
    ctx.fillRect(sx, sy + TILE / 2 - 1, TILE, 2);
    ctx.fillRect(sx + TILE / 2 - 1, sy, 2, TILE / 2);
    ctx.fillRect(sx + TILE / 4 - 1, sy + TILE / 2, 2, TILE / 2);
    ctx.fillRect(sx + TILE * 3 / 4 - 1, sy + TILE / 2, 2, TILE / 2);
    ctx.fillStyle = 'rgba(255,255,255,0.1)';
    ctx.fillRect(sx, sy, TILE, 2);
    ctx.fillRect(sx, sy, 2, TILE / 2);
  } else if (t === 4) {
    const pulse = Math.sin(Date.now() / 200) * 0.1 + 0.9;
    ctx.fillStyle = COLORS.qBlock;
    ctx.fillRect(sx, sy, TILE, TILE);
    ctx.fillStyle = COLORS.qBlockShine;
    ctx.fillRect(sx + 2, sy + 2, 4, 4);
    ctx.fillStyle = '#804000';
    ctx.fillRect(sx, sy, TILE, 2);
    ctx.fillRect(sx, sy, 2, TILE);
    ctx.fillRect(sx + TILE - 2, sy, 2, TILE);
    ctx.fillRect(sx, sy + TILE - 2, TILE, 2);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${14 * pulse}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('?', sx + TILE / 2, sy + TILE * 0.72);
    ctx.textAlign = 'left';
  } else if (t === 5) {
    ctx.fillStyle = COLORS.pipeDark;
    ctx.fillRect(sx - 4, sy, TILE * 2 + 8, TILE);
    ctx.fillStyle = COLORS.pipe;
    ctx.fillRect(sx, sy, TILE * 2, TILE);
    ctx.fillStyle = '#00d000';
    ctx.fillRect(sx + 4, sy + 4, TILE * 2 - 8, 4);
  } else if (t === 6) {
    ctx.fillStyle = COLORS.pipe;
    ctx.fillRect(sx + 4, sy, TILE - 8, TILE);
    ctx.fillStyle = '#00d000';
    ctx.fillRect(sx + 6, sy, 4, TILE);
    ctx.fillStyle = '#005000';
    ctx.fillRect(sx + TILE - 12, sy, 4, TILE);
  }
}

function drawFlag(cam) {
  const { flagX, flagY } = state.map;
  const sx = flagX - cam;

  ctx.fillStyle = COLORS.flagPole;
  ctx.fillRect(sx, flagY, 4, H - flagY);

  ctx.fillStyle = state.flagReached ? '#fff' : COLORS.flag;
  ctx.beginPath();
  ctx.moveTo(sx + 4, flagY);
  ctx.lineTo(sx + 32, flagY + 14);
  ctx.lineTo(sx + 4, flagY + 28);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(sx + 2, flagY, 6, 0, Math.PI * 2);
  ctx.fill();
}

function drawEnemy(e, cam) {
  const sx = e.x - cam;
  const sy = e.y;

  if (sx < -40 || sx > W + 40) return;

  if (e.dead) {
    ctx.globalAlpha = 1 - e.deadTimer / 30;
    ctx.fillStyle = COLORS.enemy;
    ctx.fillRect(sx, sy + e.h - 8, e.w, 8);
    ctx.globalAlpha = 1;
    return;
  }

  if (e.type === 'goomba') {
    ctx.fillStyle = '#8b4513';
    ctx.fillRect(sx + 2, sy + 4, e.w - 4, e.h - 8);
    ctx.fillStyle = COLORS.enemy;
    ctx.fillRect(sx + 4, sy, e.w - 8, e.h - 10);

    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 5, sy + 4, 7, 7);
    ctx.fillRect(sx + e.w - 12, sy + 4, 7, 7);

    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 6, sy + 6, 4, 4);
    ctx.fillRect(sx + e.w - 10, sy + 6, 4, 4);

    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 4, sy + 3, 9, 2);
    ctx.fillRect(sx + e.w - 13, sy + 3, 9, 2);

    const f = e.frame;
    ctx.fillStyle = '#6b3410';
    ctx.fillRect(sx + (f === 0 ? 2 : 6), sy + e.h - 6, 8, 6);
    ctx.fillRect(sx + (f === 0 ? e.w - 10 : e.w - 14), sy + e.h - 6, 8, 6);
  } else {
    ctx.fillStyle = '#006000';
    ctx.fillRect(sx + 2, sy, e.w - 4, e.h - 6);
    ctx.fillStyle = '#8b0000';
    ctx.fillRect(sx + 6, sy, e.w - 12, 12);
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(sx + 4, sy + 12, e.w - 8, e.h - 20);

    ctx.fillStyle = '#004000';
    ctx.fillRect(sx + e.w / 2 - 2, sy + 14, 4, e.h - 22);

    ctx.fillStyle = '#fff';
    ctx.fillRect(sx + 6, sy + 4, 5, 5);
    ctx.fillStyle = '#000';
    ctx.fillRect(sx + 7, sy + 5, 3, 3);
  }
}

function drawPlayer(cam) {
  const p = state.player;

  if (state.deathTimer > 0 && state.deathTimer < 70) {
    if (Math.floor(state.deathTimer / 4) % 2 === 0) return;
  }

  if (state.invincible > 0 && Math.floor(state.invincible / 4) % 2 === 0) return;

  const sx = Math.round(p.x - cam);
  const sy = Math.round(p.y);
  const flip = p.facing < 0;

  ctx.save();

  if (flip) {
    ctx.translate(sx + p.w, sy);
    ctx.scale(-1, 1);
  } else {
    ctx.translate(sx, sy);
  }

  const f = p.frame;

  ctx.fillStyle = COLORS.mario;
  ctx.fillRect(2, 0, 20, 4);
  ctx.fillRect(0, 4, 24, 4);

  ctx.fillStyle = COLORS.marioSkin;
  ctx.fillRect(4, 8, 16, 8);

  ctx.fillStyle = '#000';
  ctx.fillRect(12, 10, 3, 3);

  ctx.fillStyle = COLORS.marioBrown;
  ctx.fillRect(6, 14, 12, 3);
  ctx.fillRect(10, 13, 4, 2);

  ctx.fillStyle = '#0000c8';
  ctx.fillRect(4, 16, 16, 10);

  ctx.fillStyle = COLORS.mario;
  ctx.fillRect(2, 16, 4, 6);
  ctx.fillRect(18, 16, 4, 6);

  ctx.fillStyle = '#ffd700';
  ctx.fillRect(10, 18, 3, 3);

  if (!p.onGround) {
    ctx.fillStyle = '#0000c8';
    ctx.fillRect(2, 26, 8, 6);
    ctx.fillRect(14, 26, 8, 6);

    ctx.fillStyle = COLORS.marioBrown;
    ctx.fillRect(2, 30, 8, 4);
    ctx.fillRect(14, 30, 8, 4);
  } else {
    const legOff = [0, 3, -3][f];
    ctx.fillStyle = '#0000c8';
    ctx.fillRect(4, 26, 6, 6);
    ctx.fillRect(14, 26, 6, 6);

    ctx.fillStyle = COLORS.marioBrown;
    ctx.fillRect(2 + legOff, 30, 8, 4);
    ctx.fillRect(14 - legOff, 30, 8, 4);
  }

  ctx.restore();
}

function drawCoinPixel(cx, cy, size) {
  ctx.fillStyle = COLORS.coin;
  ctx.beginPath();
  ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = COLORS.coinShine;
  ctx.beginPath();
  ctx.arc(cx - size * 0.15, cy - size * 0.15, size * 0.25, 0, Math.PI * 2);
  ctx.fill();
}

function showOverlay(title, sub) {
  overlay.innerHTML = `
    <h1>${title}</h1>
    <p>${sub}</p>
    <div class="key-hint">R 키 또는 아래 버튼으로 재시작</div>
    <button class="ctrl-btn" onclick="restartGame()" style="margin-top:20px">▶ RESTART</button>
  `;
  overlay.style.display = 'flex';
}

function hideOverlay() {
  overlay.style.display = 'none';
}

function showStart() {
  overlay.innerHTML = `
    <h1>SUPER MARIO WEB</h1>
    <p>🍄 클래식 마리오 스타일 플랫포머</p>
    <div class="key-hint">
      ← → : 이동 &nbsp;|&nbsp; SPACE / ↑ : 점프<br>
      Z : 달리기 &nbsp;|&nbsp; R : 재시작
    </div>
    <button class="ctrl-btn" id="btnStart" style="margin-top:22px;font-size:13px;padding:14px 32px;background:#00a800;border-color:#ffd700;">
      ▶ 게임 시작
    </button>
  `;
  overlay.style.display = 'flex';
  document.getElementById('btnStart').addEventListener('pointerdown', startGame);
}

function startGame() {
  initGame(1);
  state.running = true;
  hideOverlay();
}

window.restartGame = function() {
  initGame(1);
  state.running = true;
  hideOverlay();
};

keys = {};
touchKeys = { left: false, right: false, jump: false, run: false };

document.addEventListener('keydown', e => {
  keys[e.code] = true;

  if (e.code === 'Space') e.preventDefault();

  if (!state?.running) {
    if (e.code === 'Space' || e.code === 'Enter') startGame();
  }

  if (e.code === 'KeyR') restartGame();
});

document.addEventListener('keyup', e => {
  keys[e.code] = false;
});

function bindBtn(id, key) {
  const el = document.getElementById(id);

  el.addEventListener('pointerdown', (e) => {
    touchKeys[key] = true;
    if (el.setPointerCapture) {
      el.setPointerCapture(e.pointerId);
    }
  });

  el.addEventListener('pointerup', () => {
    touchKeys[key] = false;
  });

  el.addEventListener('pointercancel', () => {
    touchKeys[key] = false;
  });

  el.addEventListener('pointerleave', () => {
    touchKeys[key] = false;
  });
}

bindBtn('btnLeft', 'left');
bindBtn('btnRight', 'right');
bindBtn('btnJump', 'jump');

let last = 0;

function loop(ts) {
  const dt = Math.min((ts - last) / 16.67, 3);
  last = ts;

  if (state?.running && !state.gameOver && !state.won) {
    updatePlayer(dt);
    updateEnemies();
    updateParticles();
  }

  draw();
  requestAnimationFrame(loop);
}

initGame(1);
showStart();
requestAnimationFrame(loop);
</script>
</body>
</html>
